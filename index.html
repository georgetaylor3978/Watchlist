<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Watchlist Dashboard</title>
  <meta name="description" content="Interactive stock watchlist dashboard with filtering and grouping." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="app-header">
    <div class="header-left">
      <h1>Stock Watchlist</h1>
      <span class="stock-count" id="stock-count"></span>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="btn-toggle-filters" aria-label="Toggle filters">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <span>Filters</span>
      </button>
      <button class="btn-icon" id="btn-theme" aria-label="Toggle theme">
        <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </header>

  <!-- Filter Panel -->
  <section id="filter-panel" class="filter-panel hidden">
    <div class="filter-grid">
      <div class="filter-item">
        <label for="filter-roa">ROA (%)</label>
        <div class="filter-row">
          <select id="filter-roa-op"><option value="gte">ΓëÑ</option><option value="lte">Γëñ</option></select>
          <input type="number" id="filter-roa" step="0.1" placeholder="e.g. 10" />
        </div>
      </div>
      <div class="filter-item">
        <label for="filter-roe">ROE (%)</label>
        <div class="filter-row">
          <select id="filter-roe-op"><option value="gte">ΓëÑ</option><option value="lte">Γëñ</option></select>
          <input type="number" id="filter-roe" step="0.1" placeholder="e.g. 15" />
        </div>
      </div>
      <div class="filter-item">
        <label for="filter-fcf">FCF Margin (%)</label>
        <div class="filter-row">
          <select id="filter-fcf-op"><option value="gte">ΓëÑ</option><option value="lte">Γëñ</option></select>
          <input type="number" id="filter-fcf" step="0.1" placeholder="e.g. 10" />
        </div>
      </div>
      <div class="filter-item">
        <label for="filter-growth">Sales Growth (%)</label>
        <div class="filter-row">
          <select id="filter-growth-op"><option value="gte">ΓëÑ</option><option value="lte">Γëñ</option></select>
          <input type="number" id="filter-growth" step="0.1" placeholder="e.g. 5" />
        </div>
      </div>
      <div class="filter-item">
        <label for="filter-pe">P/E</label>
        <div class="filter-row">
          <select id="filter-pe-op"><option value="lte">Γëñ</option><option value="gte">ΓëÑ</option></select>
          <input type="number" id="filter-pe" step="0.1" placeholder="e.g. 25" />
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn-apply" id="btn-apply-filters">Apply</button>
        <button class="btn-clear" id="btn-clear-filters">Clear</button>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main id="stock-list"></main>

  <footer>
    <p>Data sourced from Yahoo Finance. 5-year averages (ROA, ROE, FCF, Growth).</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
